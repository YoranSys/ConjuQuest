name: CI / Deploy to GitHub Pages

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel the in-progress run on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # ── 1. Run tests ───────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── 2. Build & deploy (master branch only) ──────────────────────────────────
  deploy:
    name: Deploy
    needs: test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Assemble deployment directory
        run: |
          # Combine public/ (HTML, CSS, manifest, SW, icons) with src/ so all
          # absolute-style paths resolve correctly under the Pages sub-path.
          mkdir -p _site
          cp -r public/. _site/
          cp -r src _site/src

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
